      <stop offset="0%" stop-color="#0d4d2e"/>
      <stop offset="50%" stop-color="#0a3d24"/>
      <stop offset="100%" stop-color="#062818"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
