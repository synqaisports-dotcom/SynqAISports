    </filter>
  </defs>
  <rect width="800" height="520" fill="url(#grass)"/>
  <!-- LÝneas campo (blanco suave) -->
  <g fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5">
    <rect x="24" y="24" width="752" height="472" rx="6"/>
    <line x1="400" y1="24" x2="400" y2="496"/>
    <circle cx="400" cy="260" r="72"/>
    <circle cx="400" cy="260" r="3" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <rect x="24" y="176" width="120" height="168"/>
    <rect x="656" y="176" width="120" height="168"/>
    <line x1="144" y1="260" x2="24" y2="260"/>
    <line x1="656" y1="260" x2="776" y2="260"/>
  </g>
  <!-- Acento cian (referencia SynqAI) -->
  <g filter="url(#glow)" opacity="0.45">
